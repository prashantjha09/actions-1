name: Main Workflow

on:
  push:

jobs:

  call-reusable:

    uses: ./.github/workflows/reusable.yml

    with:
      db_name: ${{ vars.DB_NAME }}

    secrets:
      db_password: ${{ secrets.DB_PASSWORD }}

  use-output:

    runs-on: ubuntu-latest

    needs: call-reusable

    steps:

      - name: Show output
        run: |
          echo "Connection = ${{ needs.call-reusable.outputs.connection_string }}"
